---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: gitops-catalog-operator-e2e
spec:
  description: |
    An integration test which provisions an ephemeral Hypershift cluster, deploys GitOps Operator from catalog, and runs parallel e2e tests.
  params:
    - description: Snapshot of the application
      name: SNAPSHOT
      default: '{"components": [{"name":"gitops-operator-bundle-main", "containerImage": "quay.io/redhat-user-workloads/rh-openshift-gitops-tenant/gitops-operator-bundle:latest"}]}'
      type: string
    - description: Namespace where the Operator bundle will be deployed.
      name: NAMESPACE
      default: default
      type: string
    - description: Duration to wait for bundle installation to complete before failing.
      name: INSTALL_TIMEOUT
      default: 25m
      type: string
    - description: Git URL of catalog repository (used to resolve task definitions only; source URL for builds is auto-derived from SNAPSHOT)
      name: CATALOG_TASK_URL
      default: "https://github.com/adamsaleh/catalog.git"
      type: string
    - description: Git revision for task definitions (used to resolve task definitions only; source revision for builds is auto-derived from SNAPSHOT)
      name: CATALOG_TASK_REVISION
      default: "konflux-integration"
      type: string
    - description: OpenShift version to provision (minor version e.g. "4.14", or full patch version e.g. "4.14.57")
      name: OPENSHIFT_VERSION
      default: "4.14"
      type: string
    - description: Operator channel to use for installation (e.g., stable, latest, candidate)
      name: OPERATOR_CHANNEL
      default: "stable"
      type: string
    - description: Enable FIPS mode for the ephemeral cluster
      name: FIPS_ENABLED
      default: "false"
      type: string
    - description: Specific GitOps operator version to install (e.g., "1.14.0"). Leave empty to install the latest available on the channel.
      name: OPERATOR_VERSION
      default: ""
      type: string
    - description: Enable auto-upgrade on the operator subscription
      name: AUTO_UPGRADE
      default: "false"
      type: string
    - description: Perform an upgrade after initial installation by switching to UPGRADE_TO_CHANNEL
      name: UPGRADE
      default: "false"
      type: string
    - description: Channel to switch to for upgrade testing (only used when UPGRADE is "true")
      name: UPGRADE_TO_CHANNEL
      default: ""
      type: string
    - description: Git URL of the test repository
      name: TEST_REPO_URL
      default: "https://github.com/rh-gitops-release-qa/gitops-operator.git"
      type: string
    - description: Git branch or revision of the test repository
      name: TEST_REPO_BRANCH
      default: "master"
      type: string
    - description: Test runner script name (e.g., run-parallel-tests.sh, run-sequential-tests.sh, run-rollouts-tests.sh)
      name: TEST_SCRIPT
      default: "run-parallel-tests.sh"
      type: string
    - description: AWS instance type for the ephemeral cluster (e.g., m6g.large, m6g.xlarge, m6g.2xlarge)
      name: CLUSTER_INSTANCE_TYPE
      default: "m6g.large"
      type: string
  finally:
    - name: upload-logs
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: "$(tasks.provision-cluster.results.clusterName)"
        - name: pipelineRunName
          value: "$(context.pipelineRun.name)"
        - name: testImageUrl
          value: "$(tasks.build-ginkgo-test-image.results.IMAGE_URL)"
      taskSpec:
        params:
          - name: eaasSpaceSecretRef
            type: string
          - name: clusterName
            type: string
          - name: pipelineRunName
            type: string
          - name: testImageUrl
            type: string
        volumes:
          - name: credentials
            emptyDir: {}
          - name: quay-credentials
            secret:
              secretName: gitops-test-runner-image-push
        steps:
          - name: get-kubeconfig
            onError: continue
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(params.eaasSpaceSecretRef)
              - name: clusterName
                value: $(params.clusterName)
              - name: credentials
                value: credentials
          - name: collect-and-upload-logs
            image: $(params.testImageUrl)
            volumeMounts:
              - name: credentials
                mountPath: /credentials
              - name: quay-credentials
                mountPath: /quay-credentials
                readOnly: true
            env:
              - name: PIPELINE_RUN_NAME
                value: "$(params.pipelineRunName)"
              - name: NAMESPACE
                value: "openshift-gitops-operator"
              - name: QUAY_REPO
                value: "quay.io/devtools_gitops/test_image"
              - name: QUAY_CREDENTIALS_PATH
                value: "/quay-credentials/.dockerconfigjson"
              - name: TASK_NAMES
                value: "install-operator upgrade-operator test-operator logs"
            command:
              - /usr/local/bin/collect-and-upload-logs.sh

    - name: send-slack-notification
      runAfter:
        - upload-logs
      params:
        - name: aggregateTasksStatus
          value: "$(tasks.status)"
        - name: testImageUrl
          value: "$(tasks.build-ginkgo-test-image.results.IMAGE_URL)"
        - name: pipelineRunName
          value: "$(context.pipelineRun.name)"
        - name: testScript
          value: "$(params.TEST_SCRIPT)"
        - name: testRepoUrl
          value: "$(params.TEST_REPO_URL)"
        - name: testRepoBranch
          value: "$(params.TEST_REPO_BRANCH)"
        - name: openshiftVersion
          value: "$(params.OPENSHIFT_VERSION)"
        - name: operatorChannel
          value: "$(params.OPERATOR_CHANNEL)"
        - name: fipsEnabled
          value: "$(params.FIPS_ENABLED)"
      taskSpec:
        params:
          - name: aggregateTasksStatus
            type: string
          - name: testImageUrl
            type: string
          - name: pipelineRunName
            type: string
          - name: testScript
            type: string
          - name: testRepoUrl
            type: string
          - name: testRepoBranch
            type: string
          - name: openshiftVersion
            type: string
          - name: operatorChannel
            type: string
          - name: fipsEnabled
            type: string
        volumes:
          - name: quay-credentials
            secret:
              secretName: gitops-test-runner-image-push
        steps:
          - name: send-slack-message
            image: $(params.testImageUrl)
            volumeMounts:
              - name: quay-credentials
                mountPath: /quay-credentials
                readOnly: true
            env:
              - name: SLACK_WEBHOOK_URL
                valueFrom:
                  secretKeyRef:
                    name: slack-gitops-test-notification-url
                    key: hook-url
              - name: PIPELINE_RUN_NAME
                value: "$(params.pipelineRunName)"
              - name: AGGREGATE_STATUS
                value: "$(params.aggregateTasksStatus)"
              - name: LOG_URL
                value: "https://konflux-ui.apps.stone-prd-rh01.pg1f.p1.openshiftapps.com/ns/rh-openshift-gitops-tenant/applications/gitops-main/pipelineruns/$(params.pipelineRunName)"
              - name: QUAY_REPO
                value: "quay.io/devtools_gitops/test_image"
              - name: QUAY_CREDENTIALS_PATH
                value: "/quay-credentials/.dockerconfigjson"
              - name: TASK_NAMES
                value: "install-operator upgrade-operator test-operator"
              - name: TEST_SCRIPT
                value: "$(params.testScript)"
              - name: TEST_REPO_URL
                value: "$(params.testRepoUrl)"
              - name: TEST_REPO_BRANCH
                value: "$(params.testRepoBranch)"
              - name: OPENSHIFT_VERSION
                value: "$(params.openshiftVersion)"
              - name: OPERATOR_CHANNEL
                value: "$(params.operatorChannel)"
              - name: FIPS_ENABLED
                value: "$(params.fipsEnabled)"
            command:
              - /usr/local/bin/send-slack-message.py
  tasks:
    - name: parse-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/integration-examples
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/test_metadata.yaml
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)

    - name: build-ginkgo-test-image
      runAfter:
        - parse-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/tasks/build-ginkgo-test-image.yaml
      params:
        - name: SOURCE_URL
          value: $(tasks.parse-metadata.results.source-git-url)
        - name: SOURCE_REVISION
          value: $(tasks.parse-metadata.results.source-git-revision)
        - name: IMAGE_EXPIRES_AFTER
          value: "7d"

    - name: provision-eaas-space
      runAfter:
        - parse-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
      params:
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)

    - name: provision-cluster
      runAfter:
        - provision-eaas-space
      params:
        - name: catalogSourceUrl
          value: $(tasks.parse-metadata.results.source-git-url)
        - name: catalogSourceRevision
          value: $(tasks.parse-metadata.results.source-git-revision)
        - name: catalogTaskUrl
          value: $(params.CATALOG_TASK_URL)
        - name: catalogTaskRevision
          value: $(params.CATALOG_TASK_REVISION)
        - name: openshiftVersion
          value: $(params.OPENSHIFT_VERSION)
        - name: fipsEnabled
          value: $(params.FIPS_ENABLED)
      taskSpec:
        params:
          - name: catalogSourceUrl
            type: string
          - name: catalogSourceRevision
            type: string
          - name: catalogTaskUrl
            type: string
          - name: catalogTaskRevision
            type: string
          - name: openshiftVersion
            type: string
          - name: fipsEnabled
            type: string
        results:
          - name: clusterName
            value: "$(steps.create-cluster.results.clusterName)"
          - name: resolvedVersion
            value: "$(steps.resolve-openshift-version.results.resolvedVersion)"
        steps:
          - name: get-supported-versions
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-supported-ephemeral-cluster-versions/0.1/eaas-get-supported-ephemeral-cluster-versions.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
          - name: extract-image-content-sources
            ref:
              resolver: git
              params:
                - name: url
                  value: $(params.catalogTaskUrl)
                - name: revision
                  value: $(params.catalogTaskRevision)
                - name: pathInRepo
                  value: .tekton/stepactions/extract-image-content-sources.yaml
            params:
              - name: gitUrl
                value: $(params.catalogSourceUrl)
              - name: gitRevision
                value: $(params.catalogSourceRevision)
          - name: resolve-openshift-version
            ref:
              resolver: git
              params:
                - name: url
                  value: $(params.catalogTaskUrl)
                - name: revision
                  value: $(params.catalogTaskRevision)
                - name: pathInRepo
                  value: .tekton/stepactions/resolve-openshift-version.yaml
            params:
              - name: version
                value: $(params.openshiftVersion)
          - name: create-cluster
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
              - name: imageContentSourcesFile
                value: "/workspace/imageContentSources.json"

              - name: timeout
                value: "60m"
              - name: version
                value: "$(steps.resolve-openshift-version.results.resolvedVersion)"
              - name: fips
                value: "$(params.fipsEnabled)"
              - name: instanceType
                value: "$(params.CLUSTER_INSTANCE_TYPE)"

    - name: install-operator
      runAfter:
        - provision-cluster
        - build-ginkgo-test-image
      params:
        - name: openshiftVersion
          value: "$(params.OPENSHIFT_VERSION)"
        - name: namespace
          value: "openshift-gitops-operator"
        - name: installTimeout
          value: "$(params.INSTALL_TIMEOUT)"
        - name: operatorChannel
          value: "$(params.OPERATOR_CHANNEL)"
        - name: operatorVersion
          value: "$(params.OPERATOR_VERSION)"
        - name: autoUpgrade
          value: "$(params.AUTO_UPGRADE)"
        - name: upgrade
          value: "$(params.UPGRADE)"
        - name: upgradeToChannel
          value: "$(params.UPGRADE_TO_CHANNEL)"
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: "$(tasks.provision-cluster.results.clusterName)"
        - name: pipelineRunName
          value: "$(context.pipelineRun.name)"
      taskSpec:
        params:
          - name: openshiftVersion
            type: string
          - name: namespace
            type: string
          - name: installTimeout
            type: string
          - name: operatorChannel
            type: string
          - name: operatorVersion
            type: string
          - name: autoUpgrade
            type: string
          - name: upgrade
            type: string
          - name: upgradeToChannel
            type: string
          - name: eaasSpaceSecretRef
            type: string
          - name: clusterName
            type: string
          - name: pipelineRunName
            type: string
        results:
          - name: installedCSV
            value: "$(steps.get-installed-version.results.installedCSV)"
        volumes:
          - name: credentials
            emptyDir: {}
          - name: quay-credentials
            secret:
              secretName: gitops-test-runner-image-push
          - name: quay-pull-credentials
            secret:
              secretName: gitops-quay-pull-secret-merged
        steps:
          - name: get-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(params.eaasSpaceSecretRef)
              - name: clusterName
                value: $(params.clusterName)
              - name: credentials
                value: credentials
          - name: install-operator
            image: $(tasks.build-ginkgo-test-image.results.IMAGE_URL)
            volumeMounts:
              - name: credentials
                mountPath: /credentials
              - name: quay-credentials
                mountPath: /quay-credentials
                readOnly: true
              - name: quay-pull-credentials
                mountPath: /quay-pull-credentials
                readOnly: true
            env:
              - name: OPENSHIFT_VERSION
                value: "$(params.openshiftVersion)"
              - name: NAMESPACE
                value: "openshift-gitops-operator"
              - name: INSTALL_TIMEOUT
                value: "$(params.installTimeout)"
              - name: OPERATOR_CHANNEL
                value: "$(params.operatorChannel)"
              - name: OPERATOR_VERSION
                value: "$(params.operatorVersion)"
              - name: AUTO_UPGRADE
                value: "$(params.autoUpgrade)"
              - name: KUBECONFIG
                value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
              - name: TASK_LOG_NAME
                value: "install-operator"
              - name: PIPELINE_RUN_NAME
                value: "$(params.pipelineRunName)"
              - name: QUAY_REPO
                value: "quay.io/devtools_gitops/test_image"
            command:
              - /bin/bash
              - -c
              - |
                /usr/local/bin/print-cluster-login-info.sh
                /usr/local/bin/run-and-save-logs.sh /usr/local/bin/install-operator.sh
          - name: upgrade-operator
            image: $(tasks.build-ginkgo-test-image.results.IMAGE_URL)
            volumeMounts:
              - name: credentials
                mountPath: /credentials
              - name: quay-credentials
                mountPath: /quay-credentials
                readOnly: true
            env:
              - name: NAMESPACE
                value: "openshift-gitops-operator"
              - name: INSTALL_TIMEOUT
                value: "$(params.installTimeout)"
              - name: UPGRADE
                value: "$(params.upgrade)"
              - name: UPGRADE_TO_CHANNEL
                value: "$(params.upgradeToChannel)"
              - name: KUBECONFIG
                value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
              - name: TASK_LOG_NAME
                value: "upgrade-operator"
              - name: PIPELINE_RUN_NAME
                value: "$(params.pipelineRunName)"
              - name: QUAY_REPO
                value: "quay.io/devtools_gitops/test_image"
            command:
              - /usr/local/bin/run-and-save-logs.sh
              - /usr/local/bin/upgrade-operator.sh
          - name: get-installed-version
            image: $(tasks.build-ginkgo-test-image.results.IMAGE_URL)
            results:
              - name: installedCSV
            volumeMounts:
              - name: credentials
                mountPath: /credentials
            env:
              - name: KUBECONFIG
                value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
              - name: NAMESPACE
                value: "openshift-gitops-operator"
              - name: RESULT_PATH
                value: "$(step.results.installedCSV.path)"
            command:
              - /usr/local/bin/get-installed-version.sh

    - name: test-operator
      runAfter:
        - install-operator
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: "$(tasks.provision-cluster.results.clusterName)"
        - name: pipelineRunName
          value: "$(context.pipelineRun.name)"
        - name: testRepoUrl
          value: "$(params.TEST_REPO_URL)"
        - name: testRepoBranch
          value: "$(params.TEST_REPO_BRANCH)"
        - name: testScript
          value: "$(params.TEST_SCRIPT)"
        - name: openshiftVersion
          value: "$(params.OPENSHIFT_VERSION)"
      taskSpec:
        params:
          - name: eaasSpaceSecretRef
            type: string
          - name: clusterName
            type: string
          - name: pipelineRunName
            type: string
          - name: testRepoUrl
            type: string
          - name: testRepoBranch
            type: string
          - name: testScript
            type: string
          - name: openshiftVersion
            type: string
        results:
          - name: LOG_ARTIFACT_TAG
            description: Tag of uploaded log artifact from sidecar
        volumes:
          - name: credentials
            emptyDir: {}
          - name: quay-credentials
            secret:
              secretName: gitops-test-runner-image-push
        steps:
          - name: get-kubeconfig
            onError: continue
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(params.eaasSpaceSecretRef)
              - name: clusterName
                value: $(params.clusterName)
              - name: credentials
                value: credentials
          - name: run-tests
            image: $(tasks.build-ginkgo-test-image.results.IMAGE_URL)
            volumeMounts:
              - name: credentials
                mountPath: /credentials
              - name: quay-credentials
                mountPath: /quay-credentials
                readOnly: true
            env:
              - name: CI
                value: "konflux"
              - name: TEST_REPO_URL
                value: "$(params.testRepoUrl)"
              - name: BRANCH
                value: "$(params.testRepoBranch)"
              - name: TASK_LOG_NAME
                value: "test-operator"
              - name: PIPELINE_RUN_NAME
                value: "$(params.pipelineRunName)"
              - name: QUAY_REPO
                value: "quay.io/devtools_gitops/test_image"
              - name: OPENSHIFT_VERSION
                value: "$(params.openshiftVersion)"
              - name: TEST_SCRIPT
                value: "$(params.testScript)"
            computeResources:
              requests:
                memory: "4Gi"
                cpu: "1000m"
              limits:
                memory: "8Gi"
                cpu: "2000m"
            command:
              - /bin/bash
              - -c
              - |
                KUBECONFIG=$(find /credentials -name "*kubeconfig" -type f 2>/dev/null | head -1)
                if [[ -z "$KUBECONFIG" ]]; then
                  echo "ERROR: No kubeconfig found in /credentials"
                  ls -la /credentials/ 2>/dev/null || true
                  exit 1
                fi
                export KUBECONFIG
                /usr/local/bin/print-cluster-login-info.sh
                /usr/local/bin/run-and-save-logs.sh /usr/local/bin/"$TEST_SCRIPT"
        sidecars:
          - name: log-collector
            image: $(tasks.build-ginkgo-test-image.results.IMAGE_URL)
            workingDir: /var/log-workspace
            env:
              - name: KUBECONFIG_NAME
                value: "auto"
              - name: PIPELINE_RUN_NAME
                value: "$(params.pipelineRunName)"
              - name: BRANCH_NAME
                value: "logs"
              - name: NAMESPACE
                value: "openshift-gitops-operator"
              - name: QUAY_REPO
                value: "quay.io/devtools_gitops/test_image"
            volumeMounts:
              - name: credentials
                mountPath: /credentials
              - name: quay-credentials
                mountPath: /quay-credentials
                readOnly: true
            command: ["/bin/bash", "-c", "/usr/local/bin/collect-logs-sidecar.sh"]
