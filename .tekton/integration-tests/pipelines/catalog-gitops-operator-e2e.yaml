---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: gitops-catalog-operator-e2e
spec:
  description: |
    An integration test which provisions an ephemeral Hypershift cluster, deploys GitOps Operator from catalog, and runs parallel e2e tests.
  params:
    - description: Snapshot of the application
      name: SNAPSHOT
      default: '{"components": [{"name":"gitops-operator-bundle-main", "containerImage": "quay.io/redhat-user-workloads/rh-openshift-gitops-tenant/gitops-operator-bundle:latest"}]}'
      type: string
    - description: Namespace where the Operator bundle will be deployed.
      name: NAMESPACE
      default: default
      type: string
    - description: Duration to wait for bundle installation to complete before failing.
      name: INSTALL_TIMEOUT
      default: 25m
      type: string
    - description: OpenShift version to provision
      name: OPENSHIFT_VERSION
      default: "4.14"
      type: string
    - description: Operator channel to use for installation (e.g., latest, stable). For upgrade testing, set to the pre-upgrade channel.
      name: OPERATOR_CHANNEL
      default: "latest"
      type: string
    - description: Enable FIPS mode for the ephemeral cluster
      name: FIPS_ENABLED
      default: "false"
      type: string
    - description: Specific GitOps operator version to install (e.g., "1.14.0"). Leave empty to install the latest available on the channel.
      name: OPERATOR_VERSION
      default: ""
      type: string
    - description: Enable auto-upgrade on the operator subscription
      name: AUTO_UPGRADE
      default: "false"
      type: string
    - description: Perform an upgrade after initial installation by switching to UPGRADE_TO_CHANNEL
      name: UPGRADE
      default: "false"
      type: string
    - description: Channel to switch to for upgrade testing (only used when UPGRADE is "true")
      name: UPGRADE_TO_CHANNEL
      default: "latest"
      type: string
    - description: Git URL of the test repository
      name: TEST_REPO_URL
      default: "https://github.com/rh-gitops-release-qa/gitops-operator.git"
      type: string
    - description: Git branch or revision of the test repository
      name: TEST_REPO_BRANCH
      default: "master"
      type: string
    - description: Test runner script name (e.g., run-parallel-tests.sh, run-sequential-tests.sh, run-rollouts-tests.sh)
      name: TEST_SCRIPT
      default: "run-parallel-tests.sh"
      type: string
    - description: AWS instance type for the ephemeral cluster (e.g., m6g.large, m6g.xlarge, m6g.2xlarge)
      name: CLUSTER_INSTANCE_TYPE
      default: "m6g.large"
      type: string
    - description: Pre-built test runner image. Build locally with .tekton/test-image/build-and-push.sh
      name: TEST_IMAGE_URL
      default: "quay.io/devtools_gitops/test_image:final-amd64-a46d5ef84d91"
      type: string

  finally:
    - name: pipeline-wrapup
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: "$(tasks.provision-cluster.results.clusterName)"
        - name: pipelineRunName
          value: "$(context.pipelineRun.name)"
        - name: testImageUrl
          value: "$(params.TEST_IMAGE_URL)"
        - name: aggregateStatus
          value: "$(tasks.status)"
        - name: logUrl
          value: "https://konflux-ui.apps.stone-prd-rh01.pg1f.p1.openshiftapps.com/ns/rh-openshift-gitops-tenant/applications/gitops-main/pipelineruns/$(context.pipelineRun.name)"
        - name: pipelineName
          value: "gitops-operator-e2e"
        - name: namespace
          value: "openshift-gitops-operator"
        - name: taskNames
          value: "install-operator upgrade-operator test-operator logs"
        - name: openshiftVersion
          value: "$(params.OPENSHIFT_VERSION)"
        - name: resolvedOpenshiftVersion
          value: "$(tasks.provision-cluster.results.resolvedVersion)"
        - name: operatorChannel
          value: "$(params.OPERATOR_CHANNEL)"
        - name: fipsEnabled
          value: "$(params.FIPS_ENABLED)"
        - name: installedCSV
          value: "$(tasks.install-operator.results.installedCSV)"
        - name: testScript
          value: "$(params.TEST_SCRIPT)"
        - name: testRepoUrl
          value: "$(params.TEST_REPO_URL)"
        - name: testRepoBranch
          value: "$(params.TEST_REPO_BRANCH)"
        - name: upgrade
          value: "$(params.UPGRADE)"
      taskSpec:
        params:
          - name: eaasSpaceSecretRef
            type: string
          - name: clusterName
            type: string
          - name: pipelineRunName
            type: string
          - name: testImageUrl
            type: string
          - name: aggregateStatus
            type: string
          - name: logUrl
            type: string
          - name: pipelineName
            type: string
          - name: namespace
            type: string
          - name: taskNames
            type: string
          - name: openshiftVersion
            type: string
          - name: resolvedOpenshiftVersion
            type: string
          - name: operatorChannel
            type: string
          - name: fipsEnabled
            type: string
          - name: argocdVersion
            type: string
            default: ""
          - name: installedCSV
            type: string
            default: ""
          - name: testScript
            type: string
            default: ""
          - name: testRepoUrl
            type: string
            default: ""
          - name: testRepoBranch
            type: string
            default: ""
          - name: upgrade
            type: string
            default: ""
          - name: quayRepo
            type: string
            default: "quay.io/devtools_gitops/test_image"
          - name: quayCredentialsPath
            type: string
            default: "/quay-credentials/.dockerconfigjson"
        volumes:
          - name: credentials
            emptyDir: {}
          - name: shared
            emptyDir: {}
          - name: quay-credentials
            secret:
              secretName: gitops-test-runner-image-push
          - name: deploy-key
            secret:
              secretName: catalog-results-deploy-key
              defaultMode: 0400
        steps:
          - name: get-kubeconfig
            onError: continue
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(params.eaasSpaceSecretRef)
              - name: clusterName
                value: $(params.clusterName)
              - name: credentials
                value: credentials

          - name: collect-and-upload-logs
            onError: continue
            image: $(params.testImageUrl)
            env:
              - name: PIPELINE_RUN_NAME
                value: $(params.pipelineRunName)
              - name: NAMESPACE
                value: $(params.namespace)
              - name: QUAY_REPO
                value: $(params.quayRepo)
              - name: QUAY_CREDENTIALS_PATH
                value: $(params.quayCredentialsPath)
              - name: TASK_NAMES
                value: $(params.taskNames)
              - name: SHARED_DIR
                value: /shared
            command:
              - /usr/local/bin/collect-and-upload-logs.sh
            volumeMounts:
              - name: credentials
                mountPath: /credentials
              - name: quay-credentials
                mountPath: /quay-credentials
              - name: shared
                mountPath: /shared

          - name: publish-results
            onError: continue
            image: $(params.testImageUrl)
            env:
              - name: PIPELINE_NAME
                value: $(params.pipelineName)
              - name: PIPELINE_RUN_NAME
                value: $(params.pipelineRunName)
              - name: AGGREGATE_STATUS
                value: $(params.aggregateStatus)
              - name: OPENSHIFT_VERSION
                value: $(params.openshiftVersion)
              - name: RESOLVED_OPENSHIFT_VERSION
                value: $(params.resolvedOpenshiftVersion)
              - name: ARGOCD_VERSION
                value: $(params.argocdVersion)
              - name: OPERATOR_CHANNEL
                value: $(params.operatorChannel)
              - name: INSTALLED_CSV
                value: $(params.installedCSV)
              - name: TEST_SCRIPT
                value: $(params.testScript)
              - name: FIPS_ENABLED
                value: $(params.fipsEnabled)
              - name: UPGRADE
                value: $(params.upgrade)
              - name: LOG_URL
                value: $(params.logUrl)
              - name: LOGS_ARTIFACT
                value: "$(params.quayRepo):$(params.pipelineRunName)-logs"
              - name: SHARED_DIR
                value: /shared
            command:
              - /usr/local/bin/publish-results.sh
            volumeMounts:
              - name: deploy-key
                mountPath: /deploy-key
                readOnly: true
              - name: shared
                mountPath: /shared

          - name: send-slack-notification
            onError: continue
            image: $(params.testImageUrl)
            env:
              - name: SLACK_WEBHOOK_URL
                valueFrom:
                  secretKeyRef:
                    name: slack-gitops-test-notification-url
                    key: hook-url
              - name: PIPELINE_RUN_NAME
                value: $(params.pipelineRunName)
              - name: AGGREGATE_STATUS
                value: $(params.aggregateStatus)
              - name: LOG_URL
                value: $(params.logUrl)
              - name: QUAY_REPO
                value: $(params.quayRepo)
              - name: QUAY_CREDENTIALS_PATH
                value: $(params.quayCredentialsPath)
              - name: TASK_NAMES
                value: $(params.taskNames)
              - name: TEST_SCRIPT
                value: $(params.testScript)
              - name: TEST_REPO_URL
                value: $(params.testRepoUrl)
              - name: TEST_REPO_BRANCH
                value: $(params.testRepoBranch)
              - name: OPENSHIFT_VERSION
                value: $(params.openshiftVersion)
              - name: OPERATOR_CHANNEL
                value: $(params.operatorChannel)
              - name: FIPS_ENABLED
                value: $(params.fipsEnabled)
              - name: SHARED_DIR
                value: /shared
            command:
              - /usr/local/bin/send-slack-message.py
            volumeMounts:
              - name: credentials
                mountPath: /credentials
              - name: quay-credentials
                mountPath: /quay-credentials
              - name: shared
                mountPath: /shared

  tasks:
    - name: parse-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/integration-examples
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/test_metadata.yaml
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)

    - name: provision-eaas-space
      runAfter:
        - parse-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
      params:
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)

    - name: provision-cluster
      runAfter:
        - provision-eaas-space
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: catalogSourceUrl
          value: $(tasks.parse-metadata.results.source-git-url)
        - name: catalogSourceRevision
          value: $(tasks.parse-metadata.results.source-git-revision)
        - name: openshiftVersion
          value: $(params.OPENSHIFT_VERSION)
        - name: fipsEnabled
          value: $(params.FIPS_ENABLED)
        - name: clusterInstanceType
          value: $(params.CLUSTER_INSTANCE_TYPE)
      taskSpec:
        params:
          - name: eaasSpaceSecretRef
            type: string
          - name: catalogSourceUrl
            type: string
          - name: catalogSourceRevision
            type: string
          - name: openshiftVersion
            type: string
          - name: fipsEnabled
            type: string
          - name: clusterInstanceType
            type: string
            default: "m6g.xlarge"
        results:
          - name: clusterName
            value: "$(steps.create-cluster.results.clusterName)"
          - name: resolvedVersion
            value: "$(steps.resolve-openshift-version.results.resolvedVersion)"
        steps:
          - name: get-supported-versions
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-supported-ephemeral-cluster-versions/0.1/eaas-get-supported-ephemeral-cluster-versions.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(params.eaasSpaceSecretRef)
          - name: extract-image-content-sources
            image: docker.io/python:3-alpine
            env:
              - name: GIT_URL
                value: $(params.catalogSourceUrl)
              - name: GIT_REVISION
                value: $(params.catalogSourceRevision)
              - name: MIRROR_SET_PATH
                value: .tekton/images-mirror-set.yaml
              - name: OUTPUT_PATH
                value: /workspace/imageContentSources.json
            script: |
              #!/bin/sh
              set -e
              apk add --no-cache git >/dev/null 2>&1
              pip install pyyaml --quiet >/dev/null 2>&1

              WORK=$(mktemp -d)
              git clone "$GIT_URL" "$WORK/repo"
              cd "$WORK/repo"
              git checkout "$GIT_REVISION"

              python3 -c "
              import yaml, json, sys
              with open('$MIRROR_SET_PATH') as f:
                  data = yaml.safe_load(f)
              json.dump(data['spec']['imageDigestMirrors'], sys.stdout)
              " > "$OUTPUT_PATH"

              echo "Successfully extracted imageContentSources from $GIT_URL"
          - name: resolve-openshift-version
            image: docker.io/python:3-alpine
            results:
              - name: resolvedVersion
                description: Resolved OpenShift version (full x.y.z format)
            env:
              - name: OPENSHIFT_VERSION
                value: $(params.openshiftVersion)
              - name: RESULT_PATH
                value: $(step.results.resolvedVersion.path)
            script: |
              #!/usr/bin/env python3
              import urllib.request, json, re, os

              version = os.environ["OPENSHIFT_VERSION"]
              result_path = os.environ["RESULT_PATH"]

              if re.match(r'^\d+\.\d+\.\d+$', version):
                  with open(result_path, "w") as f:
                      f.write(version)
                  print(f"Using exact version: {version}")
                  raise SystemExit(0)

              url = f"https://quay.io/api/v1/repository/openshift-release-dev/ocp-release/tag/?filter_tag_name=like:{version}.&limit=100&onlyActiveTags=true"
              data = json.loads(urllib.request.urlopen(url).read())

              candidates = []
              for tag in data.get("tags", []):
                  name = tag["name"]
                  if name.endswith("-multi"):
                      bare = name.removesuffix("-multi")
                      if re.match(rf'^{re.escape(version)}\.\d+$', bare):
                          candidates.append(bare)

              if not candidates:
                  print(f"ERROR: Could not resolve minor version {version} to a patch release")
                  raise SystemExit(1)

              candidates.sort(key=lambda v: list(map(int, v.split("."))))
              latest = candidates[-1]

              with open(result_path, "w") as f:
                  f.write(latest)
              print(f"Resolved {version} -> {latest}")
          - name: create-cluster
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(params.eaasSpaceSecretRef)
              - name: imageContentSourcesFile
                value: "/workspace/imageContentSources.json"
              - name: timeout
                value: "60m"
              - name: version
                value: "$(steps.resolve-openshift-version.results.resolvedVersion)"
              - name: fips
                value: "$(params.fipsEnabled)"
              - name: instanceType
                value: "$(params.clusterInstanceType)"

    - name: install-operator
      runAfter:
        - provision-cluster
      params:
        - name: testImageUrl
          value: "$(params.TEST_IMAGE_URL)"
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: "$(tasks.provision-cluster.results.clusterName)"
        - name: pipelineRunName
          value: "$(context.pipelineRun.name)"
        - name: openshiftVersion
          value: "$(params.OPENSHIFT_VERSION)"
        - name: installTimeout
          value: "$(params.INSTALL_TIMEOUT)"
        - name: operatorChannel
          value: "$(params.OPERATOR_CHANNEL)"
        - name: operatorVersion
          value: "$(params.OPERATOR_VERSION)"
        - name: autoUpgrade
          value: "$(params.AUTO_UPGRADE)"
        - name: upgrade
          value: "$(params.UPGRADE)"
        - name: upgradeToChannel
          value: "$(params.UPGRADE_TO_CHANNEL)"
      taskSpec:
        params:
          - name: testImageUrl
            type: string
          - name: eaasSpaceSecretRef
            type: string
          - name: clusterName
            type: string
          - name: pipelineRunName
            type: string
          - name: openshiftVersion
            type: string
          - name: namespace
            type: string
            default: "openshift-gitops-operator"
          - name: installTimeout
            type: string
            default: "25m"
          - name: operatorChannel
            type: string
          - name: operatorVersion
            type: string
            default: ""
          - name: autoUpgrade
            type: string
            default: "false"
          - name: upgrade
            type: string
            default: "false"
          - name: upgradeToChannel
            type: string
            default: "latest"
          - name: quayRepo
            type: string
            default: "quay.io/devtools_gitops/test_image"
        results:
          - name: installedCSV
            value: "$(steps.get-installed-version.results.installedCSV)"
        volumes:
          - name: credentials
            emptyDir: {}
          - name: quay-credentials
            secret:
              secretName: gitops-test-runner-image-push
          - name: quay-pull-credentials
            secret:
              secretName: gitops-quay-pull-secret-merged
        steps:
          - name: get-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(params.eaasSpaceSecretRef)
              - name: clusterName
                value: $(params.clusterName)
              - name: credentials
                value: credentials
          - name: install-operator
            image: $(params.testImageUrl)
            volumeMounts:
              - name: credentials
                mountPath: /credentials
              - name: quay-credentials
                mountPath: /quay-credentials
                readOnly: true
              - name: quay-pull-credentials
                mountPath: /quay-pull-credentials
                readOnly: true
            env:
              - name: OPENSHIFT_VERSION
                value: $(params.openshiftVersion)
              - name: NAMESPACE
                value: $(params.namespace)
              - name: INSTALL_TIMEOUT
                value: $(params.installTimeout)
              - name: OPERATOR_CHANNEL
                value: $(params.operatorChannel)
              - name: OPERATOR_VERSION
                value: $(params.operatorVersion)
              - name: AUTO_UPGRADE
                value: $(params.autoUpgrade)
              - name: KUBECONFIG
                value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
              - name: TASK_LOG_NAME
                value: "install-operator"
              - name: PIPELINE_RUN_NAME
                value: $(params.pipelineRunName)
              - name: QUAY_REPO
                value: $(params.quayRepo)
            command:
              - /bin/bash
              - -c
              - |
                /usr/local/bin/print-cluster-login-info.sh
                /usr/local/bin/run-and-save-logs.sh /usr/local/bin/install-operator.sh
          - name: upgrade-operator
            onError: continue
            image: $(params.testImageUrl)
            volumeMounts:
              - name: credentials
                mountPath: /credentials
              - name: quay-credentials
                mountPath: /quay-credentials
                readOnly: true
            env:
              - name: NAMESPACE
                value: $(params.namespace)
              - name: INSTALL_TIMEOUT
                value: $(params.installTimeout)
              - name: UPGRADE
                value: $(params.upgrade)
              - name: UPGRADE_TO_CHANNEL
                value: $(params.upgradeToChannel)
              - name: KUBECONFIG
                value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
              - name: TASK_LOG_NAME
                value: "upgrade-operator"
              - name: PIPELINE_RUN_NAME
                value: $(params.pipelineRunName)
              - name: QUAY_REPO
                value: $(params.quayRepo)
            command:
              - /usr/local/bin/run-and-save-logs.sh
              - /usr/local/bin/upgrade-operator.sh
          - name: get-installed-version
            image: $(params.testImageUrl)
            results:
              - name: installedCSV
            volumeMounts:
              - name: credentials
                mountPath: /credentials
            env:
              - name: KUBECONFIG
                value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
              - name: NAMESPACE
                value: $(params.namespace)
              - name: RESULT_PATH
                value: "$(step.results.installedCSV.path)"
            command:
              - /usr/local/bin/get-installed-version.sh

    - name: test-operator
      runAfter:
        - install-operator
      params:
        - name: testImageUrl
          value: "$(params.TEST_IMAGE_URL)"
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: "$(tasks.provision-cluster.results.clusterName)"
        - name: pipelineRunName
          value: "$(context.pipelineRun.name)"
        - name: testRepoUrl
          value: "$(params.TEST_REPO_URL)"
        - name: testRepoBranch
          value: "$(params.TEST_REPO_BRANCH)"
        - name: testScript
          value: "$(params.TEST_SCRIPT)"
        - name: openshiftVersion
          value: "$(params.OPENSHIFT_VERSION)"
      taskSpec:
        params:
          - name: testImageUrl
            type: string
          - name: eaasSpaceSecretRef
            type: string
          - name: clusterName
            type: string
          - name: pipelineRunName
            type: string
          - name: testRepoUrl
            type: string
          - name: testRepoBranch
            type: string
          - name: testScript
            type: string
          - name: openshiftVersion
            type: string
          - name: quayRepo
            type: string
            default: "quay.io/devtools_gitops/test_image"
          - name: namespace
            type: string
            default: "openshift-gitops-operator"
        results:
          - name: LOG_ARTIFACT_TAG
            description: Tag of uploaded log artifact from sidecar
        volumes:
          - name: credentials
            emptyDir: {}
          - name: quay-credentials
            secret:
              secretName: gitops-test-runner-image-push
        steps:
          - name: get-kubeconfig
            onError: continue
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(params.eaasSpaceSecretRef)
              - name: clusterName
                value: $(params.clusterName)
              - name: credentials
                value: credentials
          - name: run-tests
            image: $(params.testImageUrl)
            volumeMounts:
              - name: credentials
                mountPath: /credentials
              - name: quay-credentials
                mountPath: /quay-credentials
                readOnly: true
            env:
              - name: CI
                value: "konflux"
              - name: TEST_REPO_URL
                value: $(params.testRepoUrl)
              - name: BRANCH
                value: $(params.testRepoBranch)
              - name: TASK_LOG_NAME
                value: "test-operator"
              - name: PIPELINE_RUN_NAME
                value: $(params.pipelineRunName)
              - name: QUAY_REPO
                value: $(params.quayRepo)
              - name: OPENSHIFT_VERSION
                value: $(params.openshiftVersion)
              - name: TEST_SCRIPT
                value: $(params.testScript)
            computeResources:
              requests:
                memory: "4Gi"
                cpu: "1000m"
              limits:
                memory: "8Gi"
                cpu: "2000m"
            command:
              - /bin/bash
              - -c
              - |
                KUBECONFIG=$(find /credentials -name "*kubeconfig" -type f 2>/dev/null | head -1)
                if [[ -z "$KUBECONFIG" ]]; then
                  echo "ERROR: No kubeconfig found in /credentials"
                  ls -la /credentials/ 2>/dev/null || true
                  exit 1
                fi
                export KUBECONFIG
                /usr/local/bin/print-cluster-login-info.sh
                /usr/local/bin/run-and-save-logs.sh /usr/local/bin/"$TEST_SCRIPT"
        sidecars:
          - name: log-collector
            image: $(params.testImageUrl)
            workingDir: /var/log-workspace
            env:
              - name: KUBECONFIG_NAME
                value: "auto"
              - name: PIPELINE_RUN_NAME
                value: $(params.pipelineRunName)
              - name: BRANCH_NAME
                value: "logs"
              - name: NAMESPACE
                value: $(params.namespace)
              - name: QUAY_REPO
                value: $(params.quayRepo)
            volumeMounts:
              - name: credentials
                mountPath: /credentials
              - name: quay-credentials
                mountPath: /quay-credentials
                readOnly: true
            command: ["/bin/bash", "-c", "/usr/local/bin/collect-logs-sidecar.sh"]

