---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: gitops-catalog-operator-e2e
spec:
  description: |
    An integration test which provisions an ephemeral Hypershift cluster, deploys GitOps Operator from catalog, and runs parallel e2e tests.
  params:
    - description: Snapshot of the application
      name: SNAPSHOT
      default: '{"components": [{"name":"gitops-operator-bundle-main", "containerImage": "quay.io/redhat-user-workloads/rh-openshift-gitops-tenant/gitops-operator-bundle:latest"}]}'
      type: string
    - description: Namespace where the Operator bundle will be deployed.
      name: NAMESPACE
      default: default
      type: string
    - description: Duration to wait for bundle installation to complete before failing.
      name: INSTALL_TIMEOUT
      default: 25m
      type: string
    - description: Git URL of catalog repository (used to resolve task definitions only; source URL for builds is auto-derived from SNAPSHOT)
      name: CATALOG_TASK_URL
      default: "https://github.com/rh-gitops-midstream/catalog"
      type: string
    - description: Git revision for task definitions (used to resolve task definitions only; source revision for builds is auto-derived from SNAPSHOT)
      name: CATALOG_TASK_REVISION
      default: "konflux-integration"
      type: string
    - description: OpenShift version to provision (minor version e.g. "4.14", or full patch version e.g. "4.14.57")
      name: OPENSHIFT_VERSION
      default: "4.14"
      type: string
    - description: Operator channel to use for installation (e.g., latest, stable). For upgrade testing, set to the pre-upgrade channel.
      name: OPERATOR_CHANNEL
      default: "latest"
      type: string
    - description: Enable FIPS mode for the ephemeral cluster
      name: FIPS_ENABLED
      default: "false"
      type: string
    - description: Specific GitOps operator version to install (e.g., "1.14.0"). Leave empty to install the latest available on the channel.
      name: OPERATOR_VERSION
      default: ""
      type: string
    - description: Enable auto-upgrade on the operator subscription
      name: AUTO_UPGRADE
      default: "false"
      type: string
    - description: Perform an upgrade after initial installation by switching to UPGRADE_TO_CHANNEL
      name: UPGRADE
      default: "false"
      type: string
    - description: Channel to switch to for upgrade testing (only used when UPGRADE is "true")
      name: UPGRADE_TO_CHANNEL
      default: "latest"
      type: string
    - description: Git URL of the test repository
      name: TEST_REPO_URL
      default: "https://github.com/rh-gitops-release-qa/gitops-operator.git"
      type: string
    - description: Git branch or revision of the test repository
      name: TEST_REPO_BRANCH
      default: "master"
      type: string
    - description: Test runner script name (e.g., run-parallel-tests.sh, run-sequential-tests.sh, run-rollouts-tests.sh)
      name: TEST_SCRIPT
      default: "run-parallel-tests.sh"
      type: string
    - description: AWS instance type for the ephemeral cluster (e.g., m6g.large, m6g.xlarge, m6g.2xlarge)
      name: CLUSTER_INSTANCE_TYPE
      default: "m6g.large"
      type: string
    - description: Pre-built test runner image. Build locally with .tekton/test-image/build-and-push.sh
      name: TEST_IMAGE_URL
      default: "quay.io/devtools_gitops/test_image:konflux_v1.21.0"
      type: string
    - description: PR label required to run tests (empty = no gating, always run). When set, push events always proceed but pull_request events require this label on the PR.
      name: GATE_LABEL
      default: ""
      type: string
    - description: Build the test runner image from source instead of using TEST_IMAGE_URL
      name: BUILD_TEST_IMAGE
      default: "false"
      type: string

  finally:
    - name: pipeline-wrapup
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/tasks/pipeline-wrapup.yaml
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: "$(tasks.provision-cluster.results.clusterName)"
        - name: pipelineRunName
          value: "$(context.pipelineRun.name)"
        - name: testImageUrl
          value: "$(tasks.overlay-test-scripts.results.image-url)"
        - name: aggregateStatus
          value: "$(tasks.status)"
        - name: logUrl
          value: "https://konflux-ui.apps.stone-prd-rh01.pg1f.p1.openshiftapps.com/ns/rh-openshift-gitops-tenant/applications/gitops-main/pipelineruns/$(context.pipelineRun.name)"
        - name: pipelineName
          value: "gitops-operator-e2e"
        - name: namespace
          value: "openshift-gitops-operator"
        - name: taskNames
          value: "install-operator upgrade-operator test-operator logs"
        - name: openshiftVersion
          value: "$(params.OPENSHIFT_VERSION)"
        - name: resolvedOpenshiftVersion
          value: "$(tasks.provision-cluster.results.resolvedVersion)"
        - name: operatorChannel
          value: "$(params.OPERATOR_CHANNEL)"
        - name: fipsEnabled
          value: "$(params.FIPS_ENABLED)"
        - name: installedCSV
          value: "$(tasks.install-operator.results.installedCSV)"
        - name: testScript
          value: "$(params.TEST_SCRIPT)"
        - name: testRepoUrl
          value: "$(params.TEST_REPO_URL)"
        - name: testRepoBranch
          value: "$(params.TEST_REPO_BRANCH)"
        - name: upgrade
          value: "$(params.UPGRADE)"

  tasks:
    - name: parse-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/integration-examples
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/test_metadata.yaml
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)

    - name: check-gate
      runAfter:
        - parse-metadata
      taskSpec:
        params:
          - name: event-type
            type: string
          - name: pull-request-number
            type: string
          - name: source-git-url
            type: string
          - name: gate-label
            type: string
          - name: pipelinerun-name
            type: string
        results:
          - name: proceed
            description: "true if tests should run, false to skip"
        steps:
          - name: check
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            env:
              - name: EVENT_TYPE
                value: $(params.event-type)
              - name: PR_NUMBER
                value: $(params.pull-request-number)
              - name: SOURCE_GIT_URL
                value: $(params.source-git-url)
              - name: GATE_LABEL
                value: $(params.gate-label)
              - name: PIPELINERUN_NAME
                value: $(params.pipelinerun-name)
            script: |
              #!/bin/sh
              set -eu

              echo "Gate check inputs:"
              echo "  EVENT_TYPE=${EVENT_TYPE:-<empty>}"
              echo "  PR_NUMBER=${PR_NUMBER:-<empty>}"
              echo "  SOURCE_GIT_URL=${SOURCE_GIT_URL:-<empty>}"
              echo "  GATE_LABEL=${GATE_LABEL:-<empty>}"

              if [ -z "${GATE_LABEL}" ]; then
                echo "No gate label configured, proceeding"
                echo -n "true" > $(results.proceed.path)
                exit 0
              fi

              # If event type is empty, try reading PipelineRun labels via Kubernetes API
              if [ -z "${EVENT_TYPE}" ] && [ -n "${PIPELINERUN_NAME}" ]; then
                echo "Event type empty from parse-metadata, checking PipelineRun labels..."
                SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null || true)
                SA_NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null || true)
                if [ -n "${SA_TOKEN}" ] && [ -n "${SA_NS}" ]; then
                  PR_JSON=$(curl -sf \
                    -H "Authorization: Bearer ${SA_TOKEN}" \
                    --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                    "https://kubernetes.default.svc/apis/tekton.dev/v1/namespaces/${SA_NS}/pipelineruns/${PIPELINERUN_NAME}" 2>/dev/null || true)
                  if [ -n "${PR_JSON}" ]; then
                    for prefix in "pac.test.appstudio.openshift.io" "pipelinesascode.tekton.dev"; do
                      if [ -z "${EVENT_TYPE}" ]; then
                        EVENT_TYPE=$(echo "${PR_JSON}" | grep -o "\"${prefix}/event-type\":\"[^\"]*\"" | head -1 | sed 's/.*:"//' | tr -d '"' || true)
                      fi
                      if [ -z "${PR_NUMBER}" ]; then
                        PR_NUMBER=$(echo "${PR_JSON}" | grep -o "\"${prefix}/pull-request\":\"[^\"]*\"" | head -1 | sed 's/.*:"//' | tr -d '"' || true)
                      fi
                    done
                    echo "  From PipelineRun API: EVENT_TYPE=${EVENT_TYPE:-<empty>} PR_NUMBER=${PR_NUMBER:-<empty>}"
                  else
                    echo "  Could not read PipelineRun from API (may lack RBAC)"
                  fi
                fi
              fi

              if [ "${EVENT_TYPE}" = "push" ]; then
                echo "Push event, proceeding"
                echo -n "true" > $(results.proceed.path)
                exit 0
              fi

              if [ "${EVENT_TYPE}" != "pull_request" ] || [ -z "${PR_NUMBER}" ]; then
                echo "Not a pull_request event or no PR number, proceeding"
                echo -n "true" > $(results.proceed.path)
                exit 0
              fi

              # Extract owner/repo from git URL
              REPO_SLUG=$(echo "${SOURCE_GIT_URL}" | sed 's|.*github.com/||' | sed 's|\.git$||')
              echo "Checking PR #${PR_NUMBER} on ${REPO_SLUG} for label '${GATE_LABEL}'..."

              LABELS=$(curl -sf "https://api.github.com/repos/${REPO_SLUG}/pulls/${PR_NUMBER}" \
                | grep -o '"name": *"[^"]*"' | sed 's/"name": *"//;s/"$//' || true)

              echo "PR labels: ${LABELS:-none}"

              if echo "${LABELS}" | grep -qx "${GATE_LABEL}"; then
                echo "Label '${GATE_LABEL}' found, proceeding"
                echo -n "true" > $(results.proceed.path)
              else
                echo "Label '${GATE_LABEL}' NOT found, skipping tests"
                echo -n "false" > $(results.proceed.path)
              fi
      params:
        - name: event-type
          value: $(tasks.parse-metadata.results.test-event-type)
        - name: pull-request-number
          value: $(tasks.parse-metadata.results.pull-request-number)
        - name: source-git-url
          value: $(tasks.parse-metadata.results.source-git-url)
        - name: gate-label
          value: $(params.GATE_LABEL)
        - name: pipelinerun-name
          value: $(context.pipelineRun.name)

    - name: build-test-image
      runAfter:
        - check-gate
      when:
        - input: $(tasks.check-gate.results.proceed)
          operator: in
          values: ["true"]
        - input: $(params.BUILD_TEST_IMAGE)
          operator: in
          values: ["true"]
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/tasks/build-ginkgo-test-image.yaml
      params:
        - name: SOURCE_URL
          value: $(params.CATALOG_TASK_URL)
        - name: SOURCE_REVISION
          value: $(params.CATALOG_TASK_REVISION)
        - name: IMAGE_EXPIRES_AFTER
          value: "7d"

    - name: resolve-test-image
      runAfter:
        - check-gate
        - build-test-image
      when:
        - input: $(tasks.check-gate.results.proceed)
          operator: in
          values: ["true"]
      taskSpec:
        params:
          - name: test-image-url
            type: string
          - name: build-test-image-flag
            type: string
          - name: pipelinerun-name
            type: string
        results:
          - name: image-url
            description: Resolved base image URL for overlay
        steps:
          - name: resolve
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            env:
              - name: TEST_IMAGE_URL
                value: $(params.test-image-url)
              - name: BUILD_TEST_IMAGE
                value: $(params.build-test-image-flag)
              - name: PIPELINERUN_NAME
                value: $(params.pipelinerun-name)
            script: |
              #!/bin/sh
              set -eu

              if [ "${BUILD_TEST_IMAGE}" = "true" ]; then
                echo "BUILD_TEST_IMAGE=true, looking up build-test-image result..."
                SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null || true)
                SA_NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null || true)
                TASKRUN_NAME="${PIPELINERUN_NAME}-build-test-image"

                if [ -n "${SA_TOKEN}" ] && [ -n "${SA_NS}" ]; then
                  TR_JSON=$(curl -sf \
                    -H "Authorization: Bearer ${SA_TOKEN}" \
                    --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                    "https://kubernetes.default.svc/apis/tekton.dev/v1/namespaces/${SA_NS}/taskruns/${TASKRUN_NAME}" 2>/dev/null || true)

                  if [ -n "${TR_JSON}" ]; then
                    BUILD_URL=$(echo "${TR_JSON}" | grep -o '"IMAGE_URL","value":"[^"]*"' | head -1 | sed 's/.*"value":"//;s/"$//' || true)
                    if [ -n "${BUILD_URL}" ]; then
                      echo "Found build image: ${BUILD_URL}"
                      echo -n "${BUILD_URL}" > $(results.image-url.path)
                      exit 0
                    fi
                  fi
                fi
                echo "WARNING: Could not retrieve build-test-image result, falling back to TEST_IMAGE_URL"
              fi

              echo "Using pre-built image: ${TEST_IMAGE_URL}"
              echo -n "${TEST_IMAGE_URL}" > $(results.image-url.path)
      params:
        - name: test-image-url
          value: $(params.TEST_IMAGE_URL)
        - name: build-test-image-flag
          value: $(params.BUILD_TEST_IMAGE)
        - name: pipelinerun-name
          value: $(context.pipelineRun.name)

    - name: overlay-test-scripts
      runAfter:
        - resolve-test-image
      when:
        - input: $(tasks.check-gate.results.proceed)
          operator: in
          values: ["true"]
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/tasks/overlay-test-scripts.yaml
      params:
        - name: BASE_IMAGE_URL
          value: $(tasks.resolve-test-image.results.image-url)
        - name: SOURCE_URL
          value: $(params.CATALOG_TASK_URL)
        - name: SOURCE_REVISION
          value: $(params.CATALOG_TASK_REVISION)

    - name: provision-eaas-space
      runAfter:
        - overlay-test-scripts
      when:
        - input: $(tasks.check-gate.results.proceed)
          operator: in
          values: ["true"]
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
      params:
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)

    - name: provision-cluster
      runAfter:
        - provision-eaas-space
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/tasks/provision-cluster.yaml
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: catalogSourceUrl
          value: $(tasks.parse-metadata.results.source-git-url)
        - name: catalogSourceRevision
          value: $(tasks.parse-metadata.results.source-git-revision)
        - name: catalogTaskUrl
          value: $(params.CATALOG_TASK_URL)
        - name: catalogTaskRevision
          value: $(params.CATALOG_TASK_REVISION)
        - name: openshiftVersion
          value: $(params.OPENSHIFT_VERSION)
        - name: fipsEnabled
          value: $(params.FIPS_ENABLED)
        - name: clusterInstanceType
          value: $(params.CLUSTER_INSTANCE_TYPE)

    - name: install-operator
      runAfter:
        - provision-cluster
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/tasks/install-operator.yaml
      params:
        - name: testImageUrl
          value: "$(tasks.overlay-test-scripts.results.image-url)"
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: "$(tasks.provision-cluster.results.clusterName)"
        - name: pipelineRunName
          value: "$(context.pipelineRun.name)"
        - name: openshiftVersion
          value: "$(params.OPENSHIFT_VERSION)"
        - name: installTimeout
          value: "$(params.INSTALL_TIMEOUT)"
        - name: operatorChannel
          value: "$(params.OPERATOR_CHANNEL)"
        - name: operatorVersion
          value: "$(params.OPERATOR_VERSION)"
        - name: autoUpgrade
          value: "$(params.AUTO_UPGRADE)"
        - name: upgrade
          value: "$(params.UPGRADE)"
        - name: upgradeToChannel
          value: "$(params.UPGRADE_TO_CHANNEL)"

    - name: test-operator
      runAfter:
        - install-operator
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/tasks/test-operator.yaml
      params:
        - name: testImageUrl
          value: "$(tasks.overlay-test-scripts.results.image-url)"
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: "$(tasks.provision-cluster.results.clusterName)"
        - name: pipelineRunName
          value: "$(context.pipelineRun.name)"
        - name: testRepoUrl
          value: "$(params.TEST_REPO_URL)"
        - name: testRepoBranch
          value: "$(params.TEST_REPO_BRANCH)"
        - name: testScript
          value: "$(params.TEST_SCRIPT)"
        - name: openshiftVersion
          value: "$(params.OPENSHIFT_VERSION)"
        - name: catalogUrl
          value: "$(params.CATALOG_TASK_URL)"
        - name: catalogRevision
          value: "$(params.CATALOG_TASK_REVISION)"
