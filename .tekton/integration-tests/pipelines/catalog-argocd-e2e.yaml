---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: gitops-catalog-argocd-e2e
spec:
  description: |
    ArgoCD E2E integration test which provisions an ephemeral cluster,
    extracts ArgoCD server image from catalog, deploys ArgoCD standalone,
    and runs upstream ArgoCD E2E tests.
  params:
    - description: Snapshot of the application
      name: SNAPSHOT
      default: '{"components": [{"name":"catalog-main", "containerImage": "quay.io/redhat-user-workloads/rh-openshift-gitops-tenant/catalog:latest"}]}'
      type: string
    - description: Git URL of catalog repository (for task definitions)
      name: CATALOG_TASK_URL
      default: "https://github.com/rh-gitops-midstream/catalog"
      type: string
    - description: Git revision for task definitions
      name: CATALOG_TASK_REVISION
      default: "konflux-integration"
      type: string
    - description: OpenShift version to provision
      name: OPENSHIFT_VERSION
      default: "4.20"
      type: string
    - description: Operator channel to query in catalog
      name: OPERATOR_CHANNEL
      default: "latest"
      type: string
    - description: Enable FIPS mode for the ephemeral cluster
      name: FIPS_ENABLED
      default: "false"
      type: string
    - description: ArgoCD version for upstream manifests
      name: ARGOCD_VERSION
      default: "v2.14.1"
      type: string
    - description: Git URL of the ArgoCD test repository
      name: TEST_REPO_URL
      default: "https://github.com/argoproj/argo-cd.git"
      type: string
    - description: Git branch or revision of the ArgoCD test repository
      name: TEST_REPO_BRANCH
      default: "v2.14.1"
      type: string
    - description: AWS instance type for the ephemeral cluster
      name: CLUSTER_INSTANCE_TYPE
      default: "m6g.xlarge"
      type: string
    - description: Pre-built test runner image. Build locally with .tekton/test-image/build-and-push.sh
      name: TEST_IMAGE_URL
      default: "quay.io/devtools_gitops/test_image:konflux_v1.21.0"
      type: string
    - description: PR label required to run tests (empty = no gating, always run). When set, push events always proceed but pull_request events require this label on the PR.
      name: GATE_LABEL
      default: ""
      type: string
    - description: Build the test runner image from source instead of using TEST_IMAGE_URL
      name: BUILD_TEST_IMAGE
      default: "false"
      type: string
    - description: PR label that triggers building the test image from source (e.g., build-test-image). Empty disables label-based triggering.
      name: BUILD_IMAGE_LABEL
      default: "build-test-image"
      type: string
    - description: Base Dockerfile name for building the test image (e.g., Dockerfile.base-v1.21). Different operator versions may need different Go toolchains.
      name: BASE_DOCKERFILE
      default: "Dockerfile.base-v1.21"
      type: string

  finally:
    - name: pipeline-wrapup
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/tasks/pipeline-wrapup.yaml
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: "$(tasks.provision-cluster.results.clusterName)"
        - name: pipelineRunName
          value: "$(context.pipelineRun.name)"
        - name: testImageUrl
          value: "$(tasks.overlay-test-scripts.results.image-url)"
        - name: aggregateStatus
          value: "$(tasks.status)"
        - name: logUrl
          value: "https://konflux-ui.apps.stone-prd-rh01.pg1f.p1.openshiftapps.com/ns/rh-openshift-gitops-tenant/applications/gitops-catalog/pipelineruns/$(context.pipelineRun.name)"
        - name: pipelineName
          value: "argocd-e2e"
        - name: namespace
          value: "argocd"
        - name: taskNames
          value: "extract-argocd-image deploy-argocd test-argocd"
        - name: openshiftVersion
          value: "$(params.OPENSHIFT_VERSION)"
        - name: resolvedOpenshiftVersion
          value: "$(tasks.provision-cluster.results.resolvedVersion)"
        - name: operatorChannel
          value: "$(params.OPERATOR_CHANNEL)"
        - name: fipsEnabled
          value: "$(params.FIPS_ENABLED)"
        - name: argocdVersion
          value: "$(params.ARGOCD_VERSION)"

  results:
    - name: TEST_OUTPUT
      value: $(tasks.test-argocd.results.TEST_OUTPUT)

  tasks:
    - name: parse-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/integration-examples
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/test_metadata.yaml
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)

    - name: check-gate
      runAfter:
        - parse-metadata
      taskSpec:
        params:
          - name: event-type
            type: string
          - name: pull-request-number
            type: string
          - name: source-git-url
            type: string
          - name: gate-label
            type: string
          - name: build-image-label
            type: string
          - name: build-test-image-flag
            type: string
          - name: pipelinerun-name
            type: string
        results:
          - name: proceed
            description: "true if tests should run, false to skip"
          - name: build-image
            description: "true if test image should be built from source"
        steps:
          - name: check
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            env:
              - name: EVENT_TYPE
                value: $(params.event-type)
              - name: PR_NUMBER
                value: $(params.pull-request-number)
              - name: SOURCE_GIT_URL
                value: $(params.source-git-url)
              - name: GATE_LABEL
                value: $(params.gate-label)
              - name: BUILD_IMAGE_LABEL
                value: $(params.build-image-label)
              - name: BUILD_TEST_IMAGE
                value: $(params.build-test-image-flag)
              - name: PIPELINERUN_NAME
                value: $(params.pipelinerun-name)
            script: |
              #!/bin/sh
              set -eu

              echo "Gate check inputs:"
              echo "  EVENT_TYPE=${EVENT_TYPE:-<empty>}"
              echo "  PR_NUMBER=${PR_NUMBER:-<empty>}"
              echo "  SOURCE_GIT_URL=${SOURCE_GIT_URL:-<empty>}"
              echo "  GATE_LABEL=${GATE_LABEL:-<empty>}"
              echo "  BUILD_IMAGE_LABEL=${BUILD_IMAGE_LABEL:-<empty>}"
              echo "  BUILD_TEST_IMAGE=${BUILD_TEST_IMAGE:-false}"

              PROCEED=true
              BUILD_IMAGE=${BUILD_TEST_IMAGE:-false}

              # If event type is empty, try reading PipelineRun labels via Kubernetes API
              if [ -z "${EVENT_TYPE}" ] && [ -n "${PIPELINERUN_NAME}" ]; then
                echo "Event type empty from parse-metadata, checking PipelineRun labels..."
                SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null || true)
                SA_NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null || true)
                if [ -n "${SA_TOKEN}" ] && [ -n "${SA_NS}" ]; then
                  PR_JSON=$(curl -sf \
                    -H "Authorization: Bearer ${SA_TOKEN}" \
                    --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                    "https://kubernetes.default.svc/apis/tekton.dev/v1/namespaces/${SA_NS}/pipelineruns/${PIPELINERUN_NAME}" 2>/dev/null || true)
                  if [ -n "${PR_JSON}" ]; then
                    for prefix in "pac.test.appstudio.openshift.io" "pipelinesascode.tekton.dev"; do
                      if [ -z "${EVENT_TYPE}" ]; then
                        EVENT_TYPE=$(echo "${PR_JSON}" | grep -o "\"${prefix}/event-type\":\"[^\"]*\"" | head -1 | sed 's/.*:"//' | tr -d '"' || true)
                      fi
                      if [ -z "${PR_NUMBER}" ]; then
                        PR_NUMBER=$(echo "${PR_JSON}" | grep -o "\"${prefix}/pull-request\":\"[^\"]*\"" | head -1 | sed 's/.*:"//' | tr -d '"' || true)
                      fi
                    done
                    echo "  From PipelineRun API: EVENT_TYPE=${EVENT_TYPE:-<empty>} PR_NUMBER=${PR_NUMBER:-<empty>}"
                  else
                    echo "  Could not read PipelineRun from API (may lack RBAC)"
                  fi
                fi
              fi

              # Fetch PR labels if this is a pull_request event
              LABELS=""
              IS_PR=false
              if [ "${EVENT_TYPE}" = "pull_request" ] && [ -n "${PR_NUMBER}" ]; then
                IS_PR=true
                REPO_SLUG=$(echo "${SOURCE_GIT_URL}" | sed 's|.*github.com/||' | sed 's|\.git$||')
                echo "Fetching labels for PR #${PR_NUMBER} on ${REPO_SLUG}..."
                LABELS=$(curl -sf "https://api.github.com/repos/${REPO_SLUG}/pulls/${PR_NUMBER}" \
                  | grep -o '"name": *"[^"]*"' | sed 's/"name": *"//;s/"$//' || true)
                echo "PR labels: ${LABELS:-none}"
              fi

              # Gate check
              if [ -n "${GATE_LABEL}" ]; then
                if [ "${EVENT_TYPE}" = "push" ]; then
                  echo "Push event, gate passes"
                elif [ "${IS_PR}" = "true" ]; then
                  if echo "${LABELS}" | grep -qx "${GATE_LABEL}"; then
                    echo "Label '${GATE_LABEL}' found, gate passes"
                  else
                    echo "Label '${GATE_LABEL}' NOT found, skipping tests"
                    PROCEED=false
                  fi
                else
                  echo "Not a gated event type, gate passes"
                fi
              else
                echo "No gate label configured, proceeding"
              fi

              # Build-image check
              if [ "${BUILD_TEST_IMAGE}" = "true" ]; then
                echo "BUILD_TEST_IMAGE=true, will build test image"
                BUILD_IMAGE=true
              elif [ -n "${BUILD_IMAGE_LABEL}" ] && [ "${IS_PR}" = "true" ]; then
                if echo "${LABELS}" | grep -qx "${BUILD_IMAGE_LABEL}"; then
                  echo "Label '${BUILD_IMAGE_LABEL}' found, will build test image"
                  BUILD_IMAGE=true
                fi
              fi

              echo -n "${PROCEED}" > $(results.proceed.path)
              echo -n "${BUILD_IMAGE}" > $(results.build-image.path)
              echo "Results: proceed=${PROCEED} build-image=${BUILD_IMAGE}"
      params:
        - name: event-type
          value: $(tasks.parse-metadata.results.test-event-type)
        - name: pull-request-number
          value: $(tasks.parse-metadata.results.pull-request-number)
        - name: source-git-url
          value: $(tasks.parse-metadata.results.source-git-url)
        - name: gate-label
          value: $(params.GATE_LABEL)
        - name: build-image-label
          value: $(params.BUILD_IMAGE_LABEL)
        - name: build-test-image-flag
          value: $(params.BUILD_TEST_IMAGE)
        - name: pipelinerun-name
          value: $(context.pipelineRun.name)

    - name: build-test-image
      runAfter:
        - check-gate
      when:
        - input: $(tasks.check-gate.results.proceed)
          operator: in
          values: ["true"]
        - input: $(tasks.check-gate.results.build-image)
          operator: in
          values: ["true"]
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/tasks/build-ginkgo-test-image.yaml
      params:
        - name: SOURCE_URL
          value: $(params.CATALOG_TASK_URL)
        - name: SOURCE_REVISION
          value: $(params.CATALOG_TASK_REVISION)
        - name: BASE_DOCKERFILE
          value: $(params.BASE_DOCKERFILE)
        - name: IMAGE_EXPIRES_AFTER
          value: "7d"

    - name: resolve-test-image
      runAfter:
        - check-gate
        - build-test-image
      when:
        - input: $(tasks.check-gate.results.proceed)
          operator: in
          values: ["true"]
      taskSpec:
        params:
          - name: test-image-url
            type: string
          - name: build-test-image-flag
            type: string
          - name: pipelinerun-name
            type: string
        results:
          - name: image-url
            description: Resolved base image URL for overlay
        steps:
          - name: resolve
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            env:
              - name: TEST_IMAGE_URL
                value: $(params.test-image-url)
              - name: BUILD_TEST_IMAGE
                value: $(params.build-test-image-flag)
              - name: PIPELINERUN_NAME
                value: $(params.pipelinerun-name)
            script: |
              #!/bin/sh
              set -eu

              if [ "${BUILD_TEST_IMAGE}" = "true" ]; then
                echo "BUILD_TEST_IMAGE=true, looking up build-test-image result..."
                SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null || true)
                SA_NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null || true)
                TASKRUN_NAME="${PIPELINERUN_NAME}-build-test-image"

                if [ -n "${SA_TOKEN}" ] && [ -n "${SA_NS}" ]; then
                  TR_JSON=$(curl -sf \
                    -H "Authorization: Bearer ${SA_TOKEN}" \
                    --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                    "https://kubernetes.default.svc/apis/tekton.dev/v1/namespaces/${SA_NS}/taskruns/${TASKRUN_NAME}" 2>/dev/null || true)

                  if [ -n "${TR_JSON}" ]; then
                    BUILD_URL=$(echo "${TR_JSON}" | grep -o '"IMAGE_URL","value":"[^"]*"' | head -1 | sed 's/.*"value":"//;s/"$//' || true)
                    if [ -n "${BUILD_URL}" ]; then
                      echo "Found build image: ${BUILD_URL}"
                      echo -n "${BUILD_URL}" > $(results.image-url.path)
                      exit 0
                    fi
                  fi
                fi
                echo "WARNING: Could not retrieve build-test-image result, falling back to TEST_IMAGE_URL"
              fi

              echo "Using pre-built image: ${TEST_IMAGE_URL}"
              echo -n "${TEST_IMAGE_URL}" > $(results.image-url.path)
      params:
        - name: test-image-url
          value: $(params.TEST_IMAGE_URL)
        - name: build-test-image-flag
          value: $(tasks.check-gate.results.build-image)
        - name: pipelinerun-name
          value: $(context.pipelineRun.name)

    - name: overlay-test-scripts
      runAfter:
        - resolve-test-image
      when:
        - input: $(tasks.check-gate.results.proceed)
          operator: in
          values: ["true"]
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/tasks/overlay-test-scripts.yaml
      params:
        - name: BASE_IMAGE_URL
          value: $(tasks.resolve-test-image.results.image-url)
        - name: SOURCE_URL
          value: $(params.CATALOG_TASK_URL)
        - name: SOURCE_REVISION
          value: $(params.CATALOG_TASK_REVISION)

    - name: provision-eaas-space
      runAfter:
        - overlay-test-scripts
      when:
        - input: $(tasks.check-gate.results.proceed)
          operator: in
          values: ["true"]
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
      params:
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)

    - name: provision-cluster
      runAfter:
        - provision-eaas-space
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/tasks/provision-cluster.yaml
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: catalogSourceUrl
          value: $(params.CATALOG_TASK_URL)
        - name: catalogSourceRevision
          value: $(params.CATALOG_TASK_REVISION)
        - name: catalogTaskUrl
          value: $(params.CATALOG_TASK_URL)
        - name: catalogTaskRevision
          value: $(params.CATALOG_TASK_REVISION)
        - name: openshiftVersion
          value: $(params.OPENSHIFT_VERSION)
        - name: fipsEnabled
          value: $(params.FIPS_ENABLED)
        - name: clusterInstanceType
          value: $(params.CLUSTER_INSTANCE_TYPE)

    - name: extract-argocd-image
      runAfter:
        - overlay-test-scripts
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/tasks/extract-argocd-image.yaml
      params:
        - name: catalogImage
          value: $(tasks.parse-metadata.results.component-container-image)
        - name: operatorChannel
          value: $(params.OPERATOR_CHANNEL)
        - name: testImageUrl
          value: $(tasks.overlay-test-scripts.results.image-url)
        - name: pipelineRunName
          value: $(context.pipelineRun.name)

    - name: deploy-argocd
      runAfter:
        - extract-argocd-image
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/tasks/deploy-argocd.yaml
      params:
        - name: argoCDImage
          value: $(tasks.extract-argocd-image.results.argoCDImage)
        - name: argoCDVersion
          value: $(params.ARGOCD_VERSION)
        - name: testImageUrl
          value: $(tasks.overlay-test-scripts.results.image-url)
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: $(tasks.provision-cluster.results.clusterName)
        - name: pipelineRunName
          value: $(context.pipelineRun.name)

    - name: test-argocd
      runAfter:
        - deploy-argocd
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/tasks/test-argocd.yaml
      params:
        - name: argoCDImage
          value: $(tasks.extract-argocd-image.results.argoCDImage)
        - name: testRepoUrl
          value: $(params.TEST_REPO_URL)
        - name: testRepoBranch
          value: $(params.TEST_REPO_BRANCH)
        - name: testImageUrl
          value: $(tasks.overlay-test-scripts.results.image-url)
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: $(tasks.provision-cluster.results.clusterName)
        - name: pipelineRunName
          value: $(context.pipelineRun.name)
        - name: argoCDNamespace
          value: $(tasks.deploy-argocd.results.namespace)
        - name: argoCDServer
          value: $(tasks.deploy-argocd.results.server)
        - name: argoCDAdminPassword
          value: $(tasks.deploy-argocd.results.adminPassword)
        - name: argoCDServerName
          value: $(tasks.deploy-argocd.results.serverName)
        - name: argoCDRepoServerName
          value: $(tasks.deploy-argocd.results.repoServerName)
        - name: argoCDApplicationControllerName
          value: $(tasks.deploy-argocd.results.applicationControllerName)
        - name: argoCDRedisName
          value: $(tasks.deploy-argocd.results.redisName)
