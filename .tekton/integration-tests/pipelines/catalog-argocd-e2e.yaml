---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: gitops-catalog-argocd-e2e
spec:
  description: |
    ArgoCD E2E integration test which provisions an ephemeral cluster,
    extracts ArgoCD server image from catalog, deploys ArgoCD standalone,
    and runs upstream ArgoCD E2E tests.
  params:
    - description: Snapshot of the application
      name: SNAPSHOT
      default: '{"components": [{"name":"catalog-main", "containerImage": "quay.io/redhat-user-workloads/rh-openshift-gitops-tenant/catalog:latest"}]}'
      type: string
    - description: Git URL of catalog repository (for task definitions)
      name: CATALOG_TASK_URL
      default: "https://github.com/adamsaleh/catalog.git"
      type: string
    - description: Git revision for task definitions
      name: CATALOG_TASK_REVISION
      default: "konflux-integration"
      type: string
    - description: OpenShift version to provision
      name: OPENSHIFT_VERSION
      default: "4.14"
      type: string
    - description: Operator channel to query in catalog
      name: OPERATOR_CHANNEL
      default: "latest"
      type: string
    - description: Enable FIPS mode for the ephemeral cluster
      name: FIPS_ENABLED
      default: "false"
      type: string
    - description: ArgoCD version for upstream manifests
      name: ARGOCD_VERSION
      default: "v2.14.1"
      type: string
    - description: Git URL of the ArgoCD test repository
      name: TEST_REPO_URL
      default: "https://github.com/argoproj/argo-cd.git"
      type: string
    - description: Git branch or revision of the ArgoCD test repository
      name: TEST_REPO_BRANCH
      default: "master"
      type: string
    - description: AWS instance type for the ephemeral cluster
      name: CLUSTER_INSTANCE_TYPE
      default: "m6g.xlarge"
      type: string

  finally:
    - name: upload-logs
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: "$(tasks.provision-cluster.results.clusterName)"
        - name: pipelineRunName
          value: "$(context.pipelineRun.name)"
        - name: testImageUrl
          value: "$(tasks.build-test-image.results.IMAGE_URL)"
      taskSpec:
        params:
          - name: eaasSpaceSecretRef
            type: string
          - name: clusterName
            type: string
          - name: pipelineRunName
            type: string
          - name: testImageUrl
            type: string
        volumes:
          - name: credentials
            emptyDir: {}
          - name: quay-credentials
            secret:
              secretName: gitops-test-runner-image-push
        steps:
          - name: get-kubeconfig
            onError: continue
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(params.eaasSpaceSecretRef)
              - name: clusterName
                value: $(params.clusterName)
              - name: credentials
                value: credentials
          - name: collect-and-upload-logs
            image: $(params.testImageUrl)
            env:
              - name: PIPELINE_RUN_NAME
                value: $(params.pipelineRunName)
              - name: NAMESPACE
                value: argocd
              - name: QUAY_REPO
                value: quay.io/devtools_gitops/test_image
              - name: QUAY_CREDENTIALS_PATH
                value: /quay-credentials/.dockerconfigjson
              - name: TASK_NAMES
                value: "extract-argocd-image deploy-argocd test-argocd"
            command:
              - /usr/local/bin/collect-and-upload-logs.sh
            volumeMounts:
              - name: credentials
                mountPath: /credentials
              - name: quay-credentials
                mountPath: /quay-credentials

    - name: send-slack-notification
      params:
        - name: pipelineRunName
          value: "$(context.pipelineRun.name)"
        - name: aggregateStatus
          value: "$(tasks.status)"
        - name: logUrl
          value: "https://console.redhat.com/preview/application-pipeline/workspaces/rh-openshift-gitops-tenant/applications/gitops-catalog/pipelineruns/$(context.pipelineRun.name)?p=1"
      taskSpec:
        params:
          - name: pipelineRunName
          - name: aggregateStatus
          - name: logUrl
        volumes:
          - name: quay-credentials
            secret:
              secretName: gitops-test-runner-image-push
          - name: slack-webhook
            secret:
              secretName: slack-gitops-test-notification-url
        steps:
          - name: send-notification
            image: $(tasks.build-test-image.results.IMAGE_URL)
            env:
              - name: SLACK_WEBHOOK_URL
                valueFrom:
                  secretKeyRef:
                    name: slack-gitops-test-notification-url
                    key: hook-url
              - name: PIPELINE_RUN_NAME
                value: $(params.pipelineRunName)
              - name: AGGREGATE_STATUS
                value: $(params.aggregateStatus)
              - name: LOG_URL
                value: $(params.logUrl)
              - name: QUAY_REPO
                value: quay.io/devtools_gitops/test_image
              - name: QUAY_CREDENTIALS_PATH
                value: /quay-credentials/.dockerconfigjson
              - name: TASK_NAMES
                value: "extract-argocd-image deploy-argocd test-argocd"
            command:
              - /usr/local/bin/send-slack-message.py
            volumeMounts:
              - name: quay-credentials
                mountPath: /quay-credentials
              - name: slack-webhook
                mountPath: /slack-webhook

  results:
    - name: TEST_OUTPUT
      value: $(tasks.test-argocd.results.TEST_OUTPUT)

  tasks:
    - name: parse-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/integration-examples
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/test_metadata.yaml
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)

    - name: build-test-image
      runAfter:
        - parse-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/tasks/build-ginkgo-test-image.yaml
      params:
        - name: SOURCE_URL
          value: $(params.CATALOG_TASK_URL)
        - name: SOURCE_REVISION
          value: $(params.CATALOG_TASK_REVISION)
        - name: IMAGE_EXPIRES_AFTER
          value: "7d"

    - name: provision-eaas-space
      runAfter:
        - parse-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
      params:
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)

    - name: provision-cluster
      runAfter:
        - provision-eaas-space
      params:
        - name: catalogSourceUrl
          value: $(params.CATALOG_TASK_URL)
        - name: catalogSourceRevision
          value: $(params.CATALOG_TASK_REVISION)
        - name: catalogTaskUrl
          value: $(params.CATALOG_TASK_URL)
        - name: catalogTaskRevision
          value: $(params.CATALOG_TASK_REVISION)
        - name: openshiftVersion
          value: $(params.OPENSHIFT_VERSION)
        - name: fipsEnabled
          value: $(params.FIPS_ENABLED)
      taskSpec:
        params:
          - name: catalogSourceUrl
            type: string
          - name: catalogSourceRevision
            type: string
          - name: catalogTaskUrl
            type: string
          - name: catalogTaskRevision
            type: string
          - name: openshiftVersion
            type: string
          - name: fipsEnabled
            type: string
        results:
          - name: clusterName
            value: "$(steps.create-cluster.results.clusterName)"
          - name: resolvedVersion
            value: "$(steps.resolve-openshift-version.results.resolvedVersion)"
        steps:
          - name: get-supported-versions
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-supported-ephemeral-cluster-versions/0.1/eaas-get-supported-ephemeral-cluster-versions.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
          - name: extract-image-content-sources
            ref:
              resolver: git
              params:
                - name: url
                  value: $(params.catalogTaskUrl)
                - name: revision
                  value: $(params.catalogTaskRevision)
                - name: pathInRepo
                  value: .tekton/stepactions/extract-image-content-sources.yaml
            params:
              - name: gitUrl
                value: $(params.catalogSourceUrl)
              - name: gitRevision
                value: $(params.catalogSourceRevision)
          - name: resolve-openshift-version
            ref:
              resolver: git
              params:
                - name: url
                  value: $(params.catalogTaskUrl)
                - name: revision
                  value: $(params.catalogTaskRevision)
                - name: pathInRepo
                  value: .tekton/stepactions/resolve-openshift-version.yaml
            params:
              - name: version
                value: $(params.openshiftVersion)
          - name: create-cluster
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
              - name: imageContentSourcesFile
                value: "/workspace/imageContentSources.json"
              - name: timeout
                value: "60m"
              - name: version
                value: "$(steps.resolve-openshift-version.results.resolvedVersion)"
              - name: fips
                value: "$(params.fipsEnabled)"
              - name: instanceType
                value: "$(params.CLUSTER_INSTANCE_TYPE)"

    - name: extract-argocd-image
      runAfter:
        - provision-cluster
        - build-test-image
      params:
        - name: snapshot
          value: $(params.SNAPSHOT)
        - name: testImageUrl
          value: $(tasks.build-test-image.results.IMAGE_URL)
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: $(tasks.provision-cluster.results.clusterName)
        - name: pipelineRunName
          value: $(context.pipelineRun.name)
      taskSpec:
        params:
          - name: snapshot
            type: string
          - name: testImageUrl
          - name: eaasSpaceSecretRef
          - name: clusterName
          - name: pipelineRunName
        results:
          - name: argoCDImage
            description: ArgoCD server image extracted from catalog
        volumes:
          - name: credentials
            emptyDir: {}
          - name: quay-credentials
            secret:
              secretName: gitops-test-runner-image-push
          - name: quay-pull-credentials
            secret:
              secretName: gitops-quay-pull-secret-merged
        steps:
          - name: get-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(params.eaasSpaceSecretRef)
              - name: clusterName
                value: $(params.clusterName)
              - name: credentials
                value: credentials
          - name: extract-bundle-from-snapshot
            image: $(params.testImageUrl)
            script: |
              #!/usr/bin/env python3
              import json
              import os
              import sys

              snapshot = json.loads(os.environ["SNAPSHOT"])

              # Find bundle component in SNAPSHOT
              bundle = next(
                  (c for c in snapshot.get("components", [])
                   if "bundle" in c.get("name", "").lower()),
                  None,
              )

              if not bundle:
                  print("ERROR: No bundle component found in SNAPSHOT")
                  print("Available components:")
                  for c in snapshot.get("components", []):
                      print(f"  - {c.get('name')}")
                  sys.exit(1)

              bundle_image = bundle.get("containerImage")
              if not bundle_image:
                  print(f"ERROR: Bundle component '{bundle.get('name')}' has no containerImage")
                  sys.exit(1)

              print(f"Found bundle component: {bundle.get('name')}")
              print(f"Bundle image: {bundle_image}")

              # Write to temp file for next step
              with open("/tmp/bundle-image.txt", "w") as f:
                  f.write(bundle_image)
            env:
              - name: SNAPSHOT
                value: $(params.snapshot)
          - name: extract-argocd-from-bundle
            image: $(params.testImageUrl)
            env:
              - name: TASK_LOG_NAME
                value: extract-argocd-image
              - name: PIPELINE_RUN_NAME
                value: $(params.pipelineRunName)
              - name: QUAY_REPO
                value: quay.io/devtools_gitops/test_image
            script: |
              #!/bin/bash
              set -euo pipefail

              BUNDLE_IMAGE=$(cat /tmp/bundle-image.txt)
              echo "Extracting ArgoCD image from bundle: $BUNDLE_IMAGE"

              # Setup registry authentication for pulling bundle from Quay
              if [ -f /quay-pull-credentials/.dockerconfigjson ]; then
                  echo "Configuring registry authentication..."
                  AUTH_DIR=$(mktemp -d)
                  cp /quay-pull-credentials/.dockerconfigjson "${AUTH_DIR}/config.json"
                  export DOCKER_CONFIG="${AUTH_DIR}"
                  echo "Authentication configured (DOCKER_CONFIG=${DOCKER_CONFIG})"
              else
                  echo "WARNING: Pull credentials not found, may fail to pull bundle from Quay"
              fi

              WORK_DIR=$(mktemp -d)
              trap 'rm -rf "$WORK_DIR"' EXIT

              # Extract bundle manifests
              echo "Extracting bundle manifests..."
              if ! oc image extract "$BUNDLE_IMAGE" --path /manifests:"${WORK_DIR}" 2>&1; then
                  echo "ERROR: Failed to extract bundle manifests from ${BUNDLE_IMAGE}"
                  exit 1
              fi

              # Find CSV file
              CSV_FILE=$(find "${WORK_DIR}/manifests" -name "*.clusterserviceversion.yaml" -type f | head -1)
              if [ -z "$CSV_FILE" ]; then
                  echo "ERROR: Could not find ClusterServiceVersion in bundle"
                  find "${WORK_DIR}/manifests" -type f
                  exit 1
              fi

              echo "Found CSV: ${CSV_FILE}"

              # Extract ArgoCD server image from relatedImages
              echo "Extracting ArgoCD server image from CSV..."

              # Try to find argocd-server or argocd image name
              ARGOCD_IMAGE=$(yq eval '.spec.relatedImages[] | select(.name == "argocd-server" or .name == "argocd") | .image' "$CSV_FILE" | head -1)

              # If not found by exact name, look for argocd in image path
              if [ -z "$ARGOCD_IMAGE" ]; then
                  ARGOCD_IMAGE=$(yq eval '.spec.relatedImages[] | select(.image | contains("argocd-rhel")) | select(.image | contains("agent") | not) | select(.image | contains("extension") | not) | .image' "$CSV_FILE" | head -1)
              fi

              # Last fallback: look for any argocd image
              if [ -z "$ARGOCD_IMAGE" ]; then
                  ARGOCD_IMAGE=$(yq eval '.spec.relatedImages[] | select(.name | contains("argocd")) | select(.name | contains("agent") | not) | select(.name | contains("extension") | not) | select(.name | contains("rollouts") | not) | .image' "$CSV_FILE" | head -1)
              fi

              if [ -z "$ARGOCD_IMAGE" ]; then
                  echo "ERROR: Could not extract ArgoCD server image from bundle"
                  echo "Related images in CSV:"
                  yq eval '.spec.relatedImages[] | .name + ": " + .image' "$CSV_FILE"
                  exit 1
              fi

              echo "Successfully extracted ArgoCD image: ${ARGOCD_IMAGE}"

              # Write to temp file for save-result step
              echo "$ARGOCD_IMAGE" > /tmp/argocd-image.txt
              echo "$ARGOCD_IMAGE"
            volumeMounts:
              - name: quay-credentials
                mountPath: /quay-credentials
              - name: quay-pull-credentials
                mountPath: /quay-pull-credentials
                readOnly: true
          - name: save-result
            image: $(params.testImageUrl)
            script: |
              #!/bin/bash
              # Read the ArgoCD image from temp file written by extract-argocd-from-bundle step
              if [ ! -f /tmp/argocd-image.txt ]; then
                echo "ERROR: /tmp/argocd-image.txt not found"
                echo "ArgoCD extraction may have failed"
                exit 1
              fi

              ARGOCD_IMAGE=$(cat /tmp/argocd-image.txt)
              if [ -z "$ARGOCD_IMAGE" ]; then
                echo "ERROR: ArgoCD image is empty"
                exit 1
              fi

              echo -n "$ARGOCD_IMAGE" > $(results.argoCDImage.path)
              echo "ArgoCD image saved: $ARGOCD_IMAGE"

    - name: deploy-argocd
      runAfter:
        - extract-argocd-image
      params:
        - name: argoCDImage
          value: $(tasks.extract-argocd-image.results.argoCDImage)
        - name: argoCDVersion
          value: $(params.ARGOCD_VERSION)
        - name: testImageUrl
          value: $(tasks.build-test-image.results.IMAGE_URL)
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: $(tasks.provision-cluster.results.clusterName)
        - name: pipelineRunName
          value: $(context.pipelineRun.name)
      taskSpec:
        params:
          - name: argoCDImage
          - name: argoCDVersion
          - name: testImageUrl
          - name: eaasSpaceSecretRef
          - name: clusterName
          - name: pipelineRunName
        volumes:
          - name: credentials
            emptyDir: {}
          - name: quay-credentials
            secret:
              secretName: gitops-test-runner-image-push
        steps:
          - name: get-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(params.eaasSpaceSecretRef)
              - name: clusterName
                value: $(params.clusterName)
              - name: credentials
                value: credentials
          - name: deploy
            image: $(params.testImageUrl)
            env:
              - name: ARGOCD_SERVER_IMAGE
                value: $(params.argoCDImage)
              - name: ARGOCD_VERSION
                value: $(params.argoCDVersion)
              - name: NAMESPACE
                value: argocd
              - name: KUBECONFIG
                value: /credentials/kubeconfig
              - name: TASK_LOG_NAME
                value: deploy-argocd
              - name: PIPELINE_RUN_NAME
                value: $(params.pipelineRunName)
              - name: QUAY_REPO
                value: quay.io/devtools_gitops/test_image
            command:
              - /usr/local/bin/run-and-save-logs.sh
              - /usr/local/bin/deploy-argocd-standalone.sh
            volumeMounts:
              - name: credentials
                mountPath: /credentials
              - name: quay-credentials
                mountPath: /quay-credentials

    - name: test-argocd
      runAfter:
        - deploy-argocd
      params:
        - name: argoCDImage
          value: $(tasks.extract-argocd-image.results.argoCDImage)
        - name: testRepoUrl
          value: $(params.TEST_REPO_URL)
        - name: testRepoBranch
          value: $(params.TEST_REPO_BRANCH)
        - name: testImageUrl
          value: $(tasks.build-test-image.results.IMAGE_URL)
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: $(tasks.provision-cluster.results.clusterName)
        - name: pipelineRunName
          value: $(context.pipelineRun.name)
      taskSpec:
        params:
          - name: argoCDImage
          - name: testRepoUrl
          - name: testRepoBranch
          - name: testImageUrl
          - name: eaasSpaceSecretRef
          - name: clusterName
          - name: pipelineRunName
        results:
          - name: TEST_OUTPUT
            description: Test results in Tekton format
        volumes:
          - name: credentials
            emptyDir: {}
          - name: quay-credentials
            secret:
              secretName: gitops-test-runner-image-push
        steps:
          - name: get-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(params.eaasSpaceSecretRef)
              - name: clusterName
                value: $(params.clusterName)
              - name: credentials
                value: credentials
          - name: run-tests
            image: $(params.testImageUrl)
            env:
              - name: ARGOCD_SERVER_IMAGE
                value: $(params.argoCDImage)
              - name: TEST_REPO_URL
                value: $(params.testRepoUrl)
              - name: BRANCH
                value: $(params.testRepoBranch)
              - name: KUBECONFIG
                value: /credentials/kubeconfig
              - name: TASK_LOG_NAME
                value: test-argocd
              - name: PIPELINE_RUN_NAME
                value: $(params.pipelineRunName)
              - name: QUAY_REPO
                value: quay.io/devtools_gitops/test_image
            command:
              - /usr/local/bin/run-and-save-logs.sh
              - /usr/local/bin/run-argocd-e2e-tests.sh
            volumeMounts:
              - name: credentials
                mountPath: /credentials
              - name: quay-credentials
                mountPath: /quay-credentials
          - name: generate-test-output
            image: $(params.testImageUrl)
            script: |
              #!/usr/bin/env python3
              import json
              import datetime

              # Parse JUnit results if available
              import xml.etree.ElementTree as ET
              junit_file = "/tmp/task-logs/junit-results.xml"

              try:
                  tree = ET.parse(junit_file)
                  root = tree.getroot()
                  tests = int(root.get('tests', 0))
                  failures = int(root.get('failures', 0))
                  errors = int(root.get('errors', 0))
                  skipped = int(root.get('skipped', 0))

                  result = "SUCCESS" if (failures + errors) == 0 else "FAILURE"
              except:
                  # Fallback if JUnit not found
                  result = "SUCCESS"
                  tests = 0
                  failures = 0
                  errors = 0
                  skipped = 0

              output = {
                  "result": result,
                  "timestamp": datetime.datetime.now(datetime.timezone.utc).isoformat(),
                  "successes": tests - failures - errors - skipped,
                  "failures": failures + errors,
                  "warnings": 0
              }

              with open("$(results.TEST_OUTPUT.path)", "w") as f:
                  json.dump(output, f)

              print(json.dumps(output, indent=2))
