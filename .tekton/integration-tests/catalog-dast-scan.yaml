---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: gitops-catalog-dast-scan
spec:
  description: |
    An integration test which provisions an ephemeral Hypershift cluster and deploys an Operator from catalog.
  params:
    - description: Snapshot of the application
      name: SNAPSHOT
      default: '{"components": [{"name":"gitops-operator-bundle-main", "containerImage": "quay.io/redhat-user-workloads/rh-openshift-gitops-tenant/gitops-operator-bundle:latest"}]}'
      type: string
    - description: Namespace where the the Operator bundle will be deployed.
      name: NAMESPACE
      default: default
      type: string
    - description: Duration to wait for bundle installation to complete before failing.
      name: INSTALL_TIMEOUT
      default: 25m
      type: string
  finally:
    - name: export-logs-and-notify
      params:
        - name: STEP_ACTIONS_URL
          value: https://github.com/adamsaleh/catalog.git
        - name: STEP_ACTIONS_REVISION
          value: konflux-integration
        - name: EAAS_SPACE_SECRET_REF
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: CLUSTER_NAME
          value: $(tasks.provision-cluster.results.clusterName)
        - name: aggregateTasksStatus
          value: "$(tasks.status)"
      taskSpec:
        params:
          - name: STEP_ACTIONS_URL
            type: string
          - name: STEP_ACTIONS_REVISION
            type: string
          - name: EAAS_SPACE_SECRET_REF
            type: string
          - name: CLUSTER_NAME
            type: string
        volumes:
          - name: credentials-volume
            secret:
              secretName: catalog-quay-image-repository-image-push
          - name: eaas-credentials
            emptyDir: {}
        steps:
          - name: get-kubeconfig
            onError: continue
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(params.EAAS_SPACE_SECRET_REF)
              - name: clusterName
                value: $(params.CLUSTER_NAME)
              - name: credentials
                value: eaas-credentials
          - name: gather-cluster-diagnostics
            ref:
              resolver: git
              params:
                - name: url
                  value: $(params.STEP_ACTIONS_URL)
                - name: revision
                  value: $(params.STEP_ACTIONS_REVISION)
                - name: pathInRepo
                  value: .tekton/steps/gather-cluster-diagnostics.yaml
            params:
              - name: credentials
                value: eaas-credentials
              - name: kubeconfig
                value: "$(steps.get-kubeconfig.results.kubeconfig)"
          - name: prepare-and-push-logs
            ref:
              resolver: git
              params:
                - name: url
                  value: $(params.STEP_ACTIONS_URL)
                - name: revision
                  value: $(params.STEP_ACTIONS_REVISION)
                - name: pathInRepo
                  value: .tekton/steps/prepare-and-push-logs.yaml
            params:
              - name: pipeline-run-name
                value: "$(context.pipelineRun.name)"
              - name: namespace
                value: "$(context.pipelineRun.namespace)"
              - name: quay-repo
                value: quay.io/redhat-user-workloads/rh-openshift-gitops-tenant/catalog
              - name: credentials-volume
                value: credentials-volume
          - name: send-slack-message
            ref:
              resolver: git
              params:
                - name: url
                  value: $(params.STEP_ACTIONS_URL)
                - name: revision
                  value: $(params.STEP_ACTIONS_REVISION)
                - name: pathInRepo
                  value: .tekton/steps/send-slack-message.yaml
            params:
              - name: SLACK_SUBJECT
                value: "GitOps Bundle Integration Test $(context.pipelineRun.name): $(params.aggregateTasksStatus)"
              - name: SLACK_TEXT
                value: "Lowest integration test pipeline *$(context.pipelineRun.name)* finished with status *$(params.aggregateTasksStatus)*. Logs and artifacts are stored in the quay image tagged $(steps.prepare-and-push-logs.results.LOG_ARTIFACT_TAG)."
              - name: LOG_URL
                value: "https://konflux-ui.apps.stone-prd-rh01.pg1f.p1.openshiftapps.com/ns/rh-openshift-gitops-tenant/applications/gitops-main/pipelineruns/$(context.pipelineRun.name)"
              - name: ARTIFACTS_PATH
                value: "https://quay.io/redhat-user-workloads/rh-openshift-gitops-tenant/gitops-operator-bundle:$(steps.prepare-and-push-logs.results.LOG_ARTIFACT_TAG)"
  tasks:
    - name: parse-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/integration-examples
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/test_metadata.yaml
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
    - name: provision-eaas-space
      runAfter:
        - parse-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
      params:
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)
    - name: provision-cluster
      runAfter:
        - provision-eaas-space
      taskSpec:
        results:
          - name: clusterName
            value: "$(steps.create-cluster.results.clusterName)"
        volumes:
          - name: sources-volume
            emptyDir: {}
        steps:
          - name: get-supported-versions
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-supported-ephemeral-cluster-versions/0.1/eaas-get-supported-ephemeral-cluster-versions.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
          - name: create-cluster
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
              - name: timeout
                value: "60m"
              - name: version
                value: "4.20"
    - name: install-operator
      runAfter:
        - provision-cluster
      params:
        - name: catalogImage
          value: "$(tasks.parse-metadata.results.component-container-image)"
        - name: namespace
          value: "openshift-gitops-operator"
        - name: installTimeout
          value: "$(params.INSTALL_TIMEOUT)"
        # New params for creds
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: "$(tasks.provision-cluster.results.clusterName)"
      taskSpec:
        params:
          - name: catalogImage
            type: string
          - name: namespace
            type: string
          - name: installTimeout
            type: string
          - name: eaasSpaceSecretRef
            type: string
          - name: clusterName
            type: string
        volumes:
          - name: credentials
            emptyDir: {}
        steps:
          - name: get-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(params.eaasSpaceSecretRef)
              - name: clusterName
                value: $(params.clusterName)
              - name: credentials
                value: credentials
          - name: install-operator
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/adamsaleh/catalog.git
                - name: revision
                  value: konflux-integration
                - name: pathInRepo
                  value: .tekton/steps/install-gitops-operator-subscription.yaml
            params:
              - name: installTimeout
                value: "$(params.INSTALL_TIMEOUT)"
              - name: catalogImage
                value: "$(params.catalogImage)"
              - name: namespace
                value: "openshift-gitops-operator"
              - name: credentials
                value: credentials
              - name: kubeconfig
                value: "$(steps.get-kubeconfig.results.kubeconfig)"
    - name: test-operator
      runAfter:
        - install-operator
      params:
        # New params for creds
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: "$(tasks.provision-cluster.results.clusterName)"
      taskSpec:
        params:
          - name: eaasSpaceSecretRef
            type: string
          - name: clusterName
            type: string
        volumes:
          - name: credentials
            emptyDir: {}
          - name: gcp-key
            secret:
              secretName: gcp
        steps:
          - name: get-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(params.eaasSpaceSecretRef)
              - name: clusterName
                value: $(params.clusterName)
              - name: credentials
                value: credentials
          - name: test-operator
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/adamsaleh/catalog.git
                - name: revision
                  value: konflux-integration
                - name: pathInRepo
                  value: .tekton/steps/run-dast.yaml
            params:
              - name: credentials
                value: credentials
              - name: kubeconfig
                value: "$(steps.get-kubeconfig.results.kubeconfig)"
              - name: pwdpath
                value: "/credentials/$(steps.get-kubeconfig.results.passwordPath)"
              - name: apiurl
                value: "$(steps.get-kubeconfig.results.apiServerURL)"
              - name: clusterurl
                value: "$(steps.get-kubeconfig.results.consoleURL)"
              - name: gcpkey
                value: gcp-key
